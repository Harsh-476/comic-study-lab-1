<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Creatives: Comics</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Kalam:wght@300;400;700&family=Lato:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --white:      #ffffff;
      --bg:         #f9f9f5;
      --green:      #3d6b45;
      --text:       #1a1a1a;
      --label:      #555;
      --border:     #111;
      --btn-border: #333;
    }
    body {
      font-family: 'Lato', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* ── Decorative fixed layer ── */
    .deco {
      position: fixed;
      pointer-events: none;
      z-index: 0;
    }
    .star-glyph {
      font-size: 1.55rem;
      color: var(--green);
      display: block;
      line-height: 1;
    }
    .star-glyph.sm { font-size: 1rem; }

    .d-star-tr   { top: 54px;  right: 72px; }
    .d-star-tr2  { top: 80px;  right: 56px; }
    .d-star-ml   { top: 48%;   left: 32px; }
    .d-star-mid  { top: 385px; left: calc(50% - 230px); }

    .d-swirl-tl  { top: 18px;   left: 52px; }
    .d-swirl-br  { bottom: 55px; right: 52px; }
    .d-leaf-ml   { top: 258px;  left: 36px; }
    .d-leaf-mr   { top: 272px;  right: 44px; }

    /* ── Page wrapper ── */
    .page {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 0 40px 60px;
    }

    /* ── Header ── */
    header {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 32px 0 14px;
    }
    .site-title {
      font-family: 'Caveat', cursive;
      font-size: clamp(2.2rem, 5vw, 3.4rem);
      font-weight: 700;
      color: var(--green);
      letter-spacing: 2px;
      text-align: center;
    }
    .logout-btn {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'Lato', sans-serif;
      font-size: 0.83rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.2s;
    }
    .logout-btn:hover { color: var(--green); }

    /* ── Main grid ── */
    main {
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 0 52px;
      margin-top: 6px;
    }

    /* ── New Post ── */
    .new-post-heading {
      font-family: 'Kalam', cursive;
      font-size: clamp(1.7rem, 3.2vw, 2.4rem);
      font-weight: 400;
      color: var(--green);
      margin-bottom: 4px;
      letter-spacing: 1px;
    }
    .field-label {
      display: block;
      font-size: 0.82rem;
      color: var(--label);
      margin-bottom: 5px;
      font-style: italic;
    }
    .description-box {
      width: 100%;
      min-height: 195px;
      border: 2px solid var(--border);
      border-radius: 1px;
      background: var(--white);
      padding: 12px 14px;
      font-family: 'Lato', sans-serif;
      font-size: 0.95rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 10px;
    }
    .description-box:focus { border-color: var(--green); }

    .link-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .link-label-inline {
      font-size: 0.84rem;
      color: var(--label);
      font-style: italic;
      white-space: nowrap;
    }
    .link-input {
      flex: 1;
      border: none;
      border-bottom: 1.8px solid var(--border);
      background: transparent;
      padding: 5px 2px;
      font-family: 'Lato', sans-serif;
      font-size: 0.92rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .link-input:focus { border-color: var(--green); }

    /* File row */
    .file-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }
    .file-label-inline {
      font-size: 0.84rem;
      color: var(--label);
      font-style: italic;
    }
    #file-input { display: none; }
    .browse-btn {
      font-family: 'Lato', sans-serif;
      font-size: 0.87rem;
      font-weight: 400;
      color: var(--text);
      background: var(--white);
      border: 1.8px solid var(--btn-border);
      border-radius: 1px;
      padding: 7px 26px;
      cursor: pointer;
      transition: background 0.18s, color 0.18s;
    }
    .browse-btn:hover { background: var(--green); color: #fff; border-color: var(--green); }
    .file-chosen { font-size: 0.78rem; color: #999; font-style: italic; }

    /* Upload button — centered below file row, matching Canva */
    .upload-btn-wrap {
      display: flex;
      justify-content: flex-start;
      padding-left: 2px;
      margin-top: 4px;
    }
    .upload-btn {
      font-family: 'Lato', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--text);
      background: var(--white);
      border: 1.8px solid var(--btn-border);
      border-radius: 1px;
      padding: 9px 32px;
      cursor: pointer;
      transition: background 0.18s, color 0.18s, border-color 0.18s;
    }
    .upload-btn:hover { background: var(--green); color: #fff; border-color: var(--green); }
    .upload-btn:active { opacity: 0.8; }

    /* ── Recent Posts ── */
    .recent-posts { padding-top: 4px; }
    .recent-heading {
      font-family: 'Kalam', cursive;
      font-size: clamp(1.5rem, 2.8vw, 2.2rem);
      font-weight: 400;
      color: var(--green);
      letter-spacing: 1px;
      margin-top: 215px;   /* aligns visually with the lower-half of the form */
    }
    .posts-empty {
      margin-top: 16px;
      font-size: 0.8rem;
      color: #bbb;
      font-style: italic;
    }

    /* ── Responsive ── */
    @media (max-width: 660px) {
      main { grid-template-columns: 1fr; gap: 32px; }
      .recent-heading { margin-top: 0; }
      .page { padding: 0 18px 48px; }
      .logout-btn { font-size: 0.72rem; letter-spacing: 1.2px; }
    }
  </style>
</head>
<body>

  <!-- ═══ DECORATIVE LAYER ═══ -->

  <!-- Top-right star pair -->
  <div class="deco d-star-tr"  aria-hidden="true"><span class="star-glyph">✳</span></div>
  <div class="deco d-star-tr2" aria-hidden="true"><span class="star-glyph sm">✳</span></div>

  <!-- Mid-left star -->
  <div class="deco d-star-ml" aria-hidden="true"><span class="star-glyph">✳</span></div>

  <!-- Star near file section -->
  <div class="deco d-star-mid" aria-hidden="true"><span class="star-glyph">✳</span></div>

  <!-- Top-left swirl -->
  <div class="deco d-swirl-tl" aria-hidden="true">
    <svg width="58" height="42" viewBox="0 0 58 42" fill="none">
      <path d="M6 36 C6 36 10 10 32 5 C44 2 50 14 38 21 C28 27 18 18 26 11 C33 5 44 8 48 18"
            stroke="#3d6b45" stroke-width="2.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <!-- Bottom-right swirl -->
  <div class="deco d-swirl-br" aria-hidden="true">
    <svg width="58" height="42" viewBox="0 0 58 42" fill="none">
      <path d="M6 6 C6 6 10 32 32 37 C44 40 50 28 38 21 C28 15 18 24 26 31 C33 37 44 34 48 24"
            stroke="#3d6b45" stroke-width="2.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <!-- Mid-left leaf -->
  <div class="deco d-leaf-ml" aria-hidden="true">
    <svg width="26" height="38" viewBox="0 0 26 38" fill="none">
      <path d="M13 36 C13 36 1 22 6 8 C10 0 22 3 19 14 C17 22 8 24 13 36Z" fill="#4a7a52"/>
    </svg>
  </div>

  <!-- Mid-right leaf (larger) -->
  <div class="deco d-leaf-mr" aria-hidden="true">
    <svg width="34" height="48" viewBox="0 0 34 48" fill="none">
      <path d="M17 46 C17 46 2 28 7 10 C11 0 28 2 26 18 C24 30 11 32 17 46Z" fill="#4a7a52"/>
    </svg>
  </div>

  <!-- ═══ PAGE ═══ -->
  <div class="page">

    <!-- Header -->
    <header>
      <h1 class="site-title">Creatives: Comics</h1>
      <a href="#" class="logout-btn">LOG OUT</a>
    </header>

    <!-- Main -->
    <main>

      <!-- Left: New Post -->
      <section aria-label="New Post">
        <h2 class="new-post-heading">New Post</h2>

        <label class="field-label" for="description">Description</label>
        <textarea class="description-box" id="description" name="description" placeholder=""></textarea>

        <div class="link-row">
          <span class="link-label-inline">Link</span>
          <input class="link-input" type="url" id="post-link" name="post-link" placeholder=""/>
        </div>

        <div class="file-row">
          <span class="file-label-inline">File</span>
          <input type="file" id="file-input" name="file" accept="image/*,.pdf,.cbr,.cbz"/>
          <label for="file-input" class="browse-btn">Browse</label>
          <span class="file-chosen" id="file-name">No file chosen</span>
        </div>

        <div class="upload-btn-wrap">
          <button class="upload-btn" id="upload-btn" type="button">UPLOAD</button>
        </div>
      </section>

      <!-- Right: Recent Posts -->
      <aside aria-label="Recent Posts">
        <h2 class="recent-heading">Recent Posts</h2>
        <p class="posts-empty">No posts yet.</p>
      </aside>

    </main>
  </div>

  <!-- ═══ JS ═══ -->
  <script>
    document.getElementById('file-input').addEventListener('change', function () {
      document.getElementById('file-name').textContent =
        this.files.length ? this.files[0].name : 'No file chosen';
    });

    document.getElementById('upload-btn').addEventListener('click', function () {
      const desc = document.getElementById('description').value.trim();
      if (!desc) {
        const ta = document.getElementById('description');
        ta.style.borderColor = '#c0392b';
        ta.focus();
        setTimeout(() => ta.style.borderColor = '', 1800);
        return;
      }
      const orig = this.textContent;
      this.textContent = 'UPLOADED ✓';
      this.style.cssText = 'background:#3d6b45;color:#fff;border-color:#3d6b45';
      setTimeout(() => {
        this.textContent = orig;
        this.style.cssText = '';
      }, 2500);
    });
  </script>
</body>
</html>
