<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Creatives: Comics</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Kalam:wght@300;400;700&family=Lato:wght@400;700&display=swap" rel="stylesheet"/>

  <!-- Link CSS -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- Decorative Layer -->
  <div class="deco d-star-tr"><span class="star-glyph">✳</span></div>
  <div class="deco d-star-tr2"><span class="star-glyph sm">✳</span></div>
  <div class="deco d-star-ml"><span class="star-glyph">✳</span></div>
  <div class="deco d-star-mid"><span class="star-glyph">✳</span></div>

  <div class="deco d-swirl-tl">
    <svg width="58" height="42">
      <path d="M6 36 C6 36 10 10 32 5 C44 2 50 14 38 21"
            stroke="#3d6b45" stroke-width="2.3" fill="none"/>
    </svg>
  </div>

  <div class="deco d-swirl-br">
    <svg width="58" height="42">
      <path d="M6 6 C6 6 10 32 32 37 C44 40 50 28 38 21"
            stroke="#3d6b45" stroke-width="2.3" fill="none"/>
    </svg>
  </div>

  <div class="deco d-leaf-ml">
    <svg width="26" height="38">
      <path d="M13 36 C13 36 1 22 6 8 C10 0 22 3 19 14 C17 22 8 24 13 36Z" fill="#4a7a52"/>
    </svg>
  </div>

  <div class="deco d-leaf-mr">
    <svg width="34" height="48">
      <path d="M17 46 C17 46 2 28 7 10 C11 0 28 2 26 18 C24 30 11 32 17 46Z" fill="#4a7a52"/>
    </svg>
  </div>

  <!-- Page -->
  <div class="page">

    <header>
      <h1 class="site-title">Creatives: Comics</h1>
      <a href="#" class="logout-btn">LOG OUT</a>
    </header>

    <main>

      <section>
        <h2 class="new-post-heading">New Post</h2>

        <label class="field-label">Description</label>
        <textarea class="description-box" id="description"></textarea>

        <div class="link-row">
          <span class="link-label-inline">Link</span>
          <input class="link-input" type="url" id="post-link"/>
        </div>

        <div class="file-row">
          <span class="file-label-inline">File</span>
          <input type="file" id="file-input"/>
          <label for="file-input" class="browse-btn">Browse</label>
          <span class="file-chosen" id="file-name">No file chosen</span>
        </div>

        <div class="upload-btn-wrap">
          <button class="upload-btn" id="upload-btn">UPLOAD</button>
        </div>
      </section>

      <aside>
        <h2 class="recent-heading">Recent Posts</h2>
        <p class="posts-empty">No posts yet.</p>
      </aside>

    </main>
  </div>

  <!-- Link JS -->
  <script src="script.js"></script>

</body>
</html>
